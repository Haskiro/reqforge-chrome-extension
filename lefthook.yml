pre-commit:
  parallel: true
  commands:
    lint:
      glob: 'src/**/*.{ts,tsx}'
      run: yarn eslint --fix {staged_files} && git add {staged_files}
    format:
      glob: 'src/**/*.{ts,tsx}'
      run: yarn prettier --write {staged_files} && git add {staged_files}

commit-msg:
  commands:
    commitlint:
      run: yarn commitlint --edit {1}
